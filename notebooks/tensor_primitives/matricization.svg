<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 175" width="340" height="175" style="max-width:100%;height:auto;font-family:Georgia,'Times New Roman',serif"><text x="170" y="22" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="normal" font-style="italic" fill="#1a2233">M : W ⊗ V ← W   —  one cut, one matrix</text><rect x="140.0" y="60.0" width="60" height="70" rx="9" fill="#e9f0fb" stroke="#2b3a55" stroke-width="2"/><text x="170" y="95" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="600" fill="#2b3a55">M</text><line x1="140" y1="78" x2="80" y2="78" stroke="#2b3a55" stroke-width="2"/><text x="70" y="78" text-anchor="middle" dominant-baseline="central" font-style="italic" font-size="15" fill="#475569">W</text><line x1="140" y1="112" x2="80" y2="112" stroke="#2b3a55" stroke-width="2"/><text x="70" y="112" text-anchor="middle" dominant-baseline="central" font-style="italic" font-size="15" fill="#475569">V</text><text x="70" y="138" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="normal" font-style="normal" fill="#475569">rows = 3·2 = 6</text><line x1="200" y1="95" x2="270" y2="95" stroke="#2b3a55" stroke-width="2"/><text x="282" y="95" text-anchor="middle" dominant-baseline="central" font-style="italic" font-size="15" fill="#475569">W</text><text x="270" y="138" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="normal" font-style="normal" fill="#475569">cols = 3</text><line x1="170" y1="40" x2="170" y2="150" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="5 4"/><text x="170" y="158" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="normal" font-style="normal" fill="#c0392b">left legs → row index   |   right legs → column index</text></svg>